<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico">
  <title>Spotify - Web Player: Music for Everyone</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="utility.css" />
  <link rel="stylesheet" href="https://sets.hugeicons.com/YOUR-SET-ID.css" crossorigin="anonymous" />
</head>

<body>
  <div class="container">
    <div class="left rounded border bgblack">
      <div class="close">
        <img src="spotify/img/close.svg" class="invert" alt="">
      </div>
      <div class="home bggrey m-1 p-1">
        <div class="logo">
          <img class="invert" src="spotify/img/logo.svg" alt="logo" />
        </div>
        <ul class="li">
          <li>
            <img class="invert" src="spotify/img/home.svg" alt="home" />Home
          </li>
          <li>
            <img class="invert" src="spotify/img/search.svg" alt="search" />Search
          </li>
        </ul>
      </div>
      <div class="lib bggrey">
        <div class="heading alignitem-center">
          <img src="spotify/img/playlist.svg" class="invert" alt="playlist" />
          <h2>Your Library</h2>
          <!-- <button id="playBtn">Play Song</button> -->
        </div>
        <div class="songlist">
          <ul>








          </ul>
        </div>
        <div class="footer">
          <div>
            <a href="https://www.spotify.com/in-en/legal/">Legal</a>
          </div>
          <div>
            <a href="https://www.spotify.com/in-en/safetyandprivacy/">Safety&amp;Privacy</a>
          </div>
          <div>
            <a href="https://www.spotify.com/in-en/legal/cookies-policy/">Cookies</a>
          </div>
          <div>
            <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">About Ads</a>
          </div>
          <div>
            <a href="https://www.spotify.com/in-en/accessibility/">Accessibility</a>
          </div>
        </div>
      </div>
    </div>

    <div class="right rounded border bggrey">
      <div class="header rounded">
        <div class="nav rounded">
          <div class="hamburgerContainer">

            <img width="30px" class="invert hamburger" src="spotify/img/hamburger.svg" alt="">
            <img src="spotify/img/arrow-left.svg" alt="right" />
            <img src="spotify/img/arrow-right.svg" alt="left" />
          </div>
        </div>
        <div class="buttons">



          <button class="signupbtn">Sign Up</button>
          <button class="loginbtn">Log In</button>




        </div>
      </div>
      <div class="spotify-playlist bggrey rounded">
        <h1>Spotify Playlists</h1>
        <div class="card-container">
          <div class="card dhurandhar">
            <div class="play">
              <svg width="30px" height="30px" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="32" fill="#1fdf64" />
                <path d="M24 18L48 32L24 46Z" fill="#000" />
              </svg>
            </div>
            <!-- <img src="spotify/img/cover.jpg" alt="" /> -->

            <img
              src="https://imgs.search.brave.com/dgp_pQ_bsHuH4Vo7iCggT-Y0c1DFSwHxoFCCQinylDs/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9taXIt/czMtY2RuLWNmLmJl/aGFuY2UubmV0L3By/b2plY3RzLzQwNC9m/NTFjMmUyNDExNDQ4/NzcuWTNKdmNDd3hO/REUwTERFeE1EWXNN/Q3d3LnBuZw"
              alt="">
            <br>
            <h3>Dhurandhar The Revenge</h3>
            <!-- <br> -->
            <p>Ishq,Destiny</p>
          </div>
          <div class="card sultan">
            <div class="play">
              <svg width="30px" height="30px" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="32" fill="#1fdf64" />
                <path d="M24 18L48 32L24 46Z" fill="#000" />
              </svg>
            </div>
            <!-- <img src="spotify/img/cover.jpg" alt="" /> -->
            <img height="168px" width="190px"
              src="https://imgs.search.brave.com/iMg0Ot29qOctl6Oxv1v_DmnUROIBOsYNwV1vF7kMoGc/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly91cGxv/YWQud2lraW1lZGlh/Lm9yZy93aWtpcGVk/aWEvZW4vdGh1bWIv/MS8xZi9TdWx0YW5f/ZmlsbV9wb3N0ZXIu/anBnLzUxMnB4LVN1/bHRhbl9maWxtX3Bv/c3Rlci5qcGc"
              alt="">
            <h3>Sultan</h3>
            <p>Sultan-2018 viral songs </p>
          </div>
          <div class="card pavazhamalli">
            <div class="play">
              <svg width="30px" height="30px" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="32" fill="#1fdf64" />
                <path d="M24 18L48 32L24 46Z" fill="#000" />
              </svg>
            </div>
            <!-- <img src="spotify/img/cover.jpg" alt="" /> -->
            <img height="168px" width="190px"
              src="https://imgs.search.brave.com/P6iQw0iUNAFxrwjWgFuTXCA2Hcgb7LyADe6WsjZGWoc/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9pLnl0/aW1nLmNvbS92aS9i/NjhIRVRpTk85OC8w/LmpwZw"
              alt="">
            <h3>Pavazha Malli</h3>
            <p>viral song</p>
          </div>


        </div>
      </div>



      <div class="playbar invert">


        <div class="seekbar">
          <div class="circle"></div>
        </div>

        <div class="abovebar">

          <div class="songinfo"></div>
          <div class="pbtn">
            <img id="pre" src="spotify/img/prevsong.svg" alt="">
            <img id="play" src="spotify/img/play.svg" alt="">
            <img id="next" src="spotify/img/nextsong.svg" alt="">

          </div>
          <div class="timevol">


            <div class="songtime">
            </div>
            <div class="volume">
              <img src="spotify/img/volume.svg" alt="" srcset="">
              <div class="range">
                <input type="range" name="volume" >
              </div>
            </div>
          </div>
        </div>




      </div>




    </div>

    <script src="script.js"></script>
</body>

</html>
